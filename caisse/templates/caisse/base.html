<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007bff">
    <meta name="description" content="Application de gestion de caisse pour l'Amicale des Élèves et Étudiants de Sokala-Sobara">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AEES Caisse">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
    <title>{% block title %}AEES - Gestion de Caisse{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #007bff; }
        .card { margin-bottom: 20px; }
        .btn-primary { background-color: #28a745; border-color: #28a745; }
        .btn-primary:hover { background-color: #218838; border-color: #1e7e34; }
        .table th { background-color: #007bff; color: white; }
        
        @media print {
            body { background-color: white; }
            .navbar { display: none; }
            .btn, .pagination, .btn-close, [onclick] { display: none !important; }
            .card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
            .card-header { background-color: #f8f9fa !important; border-bottom: 2px solid #007bff; }
            .table { font-size: 12px; }
            .table th { background-color: #e9ecef !important; color: black; }
            .btn-print { display: block !important; margin: 10px 0; }
            .print-break { page-break-after: always; }
            h1, h2, h3 { page-break-after: avoid; }
            .container { width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'caisse:index' %}">
                <img src="/static/icons/icon-192.svg" alt="AEES Logo" width="32" height="32" class="me-2">
                <span>AEES - Gestion de Caisse</span>
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'caisse:membre_create' %}">Ajouter Membre</a>
                <a class="nav-link" href="{% url 'caisse:membre_list' %}">Tous les Membres</a>
                <a class="nav-link" href="{% url 'caisse:bureau_general_list' %}">Bureau Général</a>
                <a class="nav-link" href="{% url 'caisse:cotisation_record_list' %}">Gestion Cotisations</a>
                <a class="nav-link" href="{% url 'caisse:depense_list' %}">Gestion Dépenses</a>
                <a class="nav-link" href="{% url 'caisse:dashboard' %}">Tableau de Bord</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Enregistrement du service worker pour PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(registration => {
                        console.log('Service Worker enregistré avec succès:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Échec de l\'enregistrement du Service Worker:', error);
                    });
            });
        }

        // Amélioration mobile : masquer l'adresse bar sur iOS
        if (window.navigator.standalone) {
            document.body.classList.add('standalone');
        }
    </script>
</body>
</html>
