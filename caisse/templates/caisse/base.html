<!DOCTYPE html>

```
<link rel="manifest" href="{% static 'manifest.json' %}">

<title>{% block title %}AEES - Gestion de Caisse{% endblock %}</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f8f9fa;
        font-family: 'Segoe UI', sans-serif;
    }

    .card {

        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

        border-radius: 8px;
    }
</style>
```

</head>

<body>

<!-- MENU -->

<div class="container mt-3">
    <button onclick="toggleMenu()" class="btn btn-primary mb-3">
        ☰ Menu
    </button>

```
<div id="menu" class="card p-3" style="display:none;">
    <a class="btn btn-outline-primary mb-2" href="{% url 'caisse:dashboard' %}">Tableau de bord</a>
    <a class="btn btn-outline-success mb-2" href="{% url 'caisse:membre_create' %}">Ajouter membre</a>
    <a class="btn btn-outline-secondary mb-2" href="{% url 'caisse:membre_list' %}">Tous les membres</a>
    <a class="btn btn-outline-warning mb-2" href="{% url 'caisse:bureau_general_list' %}">Bureau général</a>
    <a class="btn btn-outline-info mb-2" href="{% url 'caisse:cotisation_record_list' %}">Gestion cotisations</a>
    <a class="btn btn-outline-danger mb-2" href="{% url 'caisse:depense_list' %}">Gestion des dépenses</a>
</div>
```

</div>

<script>
function toggleMenu() {
    var menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "none") ? "block" : "none";
}
</script>

<!-- CONTENU -->

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- JS Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- SERVICE WORKER -->

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register("{% static 'sw.js' %}");
    });
}
</script>

</body>
</html>
