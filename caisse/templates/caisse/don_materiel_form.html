{% extends 'caisse/base.html' %}

{% block title %}Ajouter un Don Matériel{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <h2>Ajouter un don matériel</h2>
        <a href="{% url 'caisse:index' %}" class="btn btn-light btn-sm">Retour</a>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.description.label_tag }}
                {{ form.description }}
            </div>
            <div class="mb-3">
                {{ form.source.label_tag }}
                {{ form.source }}
            </div>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
        </form>
    </div>
</div>
{% endblock %}
