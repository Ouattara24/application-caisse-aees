{% extends 'caisse/base.html' %}

{% block title %}Supprimer cotisation{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white">
        <h2>Supprimer cotisation</h2>
    </div>
    <div class="card-body">
        <p>Voulez-vous vraiment supprimer la cotisation de <strong>{{ object.membre.prenom }} {{ object.membre.nom }}</strong> ({{ object.montant }} FCFA) ?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirmer suppression</button>
            <a href="{% url 'caisse:cotisation_record_list' %}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
