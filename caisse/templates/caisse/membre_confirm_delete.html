{% extends 'caisse/base.html' %}

{% block title %}Supprimer un Membre{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
        <h2>Confirmer la suppression</h2>
        <a href="{% url 'caisse:membre_list' %}" class="btn btn-light btn-sm">Retour</a>
    </div>
    <div class="card-body">
        <p>Êtes-vous sûr de vouloir supprimer le membre <strong>{{ membre.prenom }} {{ membre.nom }}</strong> ?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Oui, supprimer</button>
            <a href="{% url 'caisse:membre_list' %}" class="btn btn-secondary">Non, annuler</a>
        </form>
    </div>
</div>
{% endblock %}
